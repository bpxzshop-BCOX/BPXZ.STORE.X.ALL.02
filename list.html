<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการแมพ — BPXZ STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #cc0000;
            --red-light: #ff3333;
            --red-dark: #660000;
            --red-deep: #990000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            background: #080000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,0,0,0.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 80%, rgba(100,0,0,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 90%, rgba(150,0,0,0.12) 0%, transparent 60%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(204,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204,0,0,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 20px 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(204,0,0,0.12);
            border: 1px solid rgba(204,0,0,0.3);
            border-radius: 30px;
            color: #ff3333;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            margin-bottom: 32px;
        }
        .back-btn:hover {
            background: rgba(204,0,0,0.22);
            border-color: rgba(204,0,0,0.6);
            transform: translateX(-3px);
        }
        .back-btn svg { width: 14px; height: 14px; }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
            animation: floatLogo 3s ease-in-out infinite;
        }
        .logo-wrap img { width: 140px; }
        @keyframes floatLogo {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        h1 {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(45deg, #660000, #cc0000, #ff3333);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 16px rgba(204,0,0,0.5)); }
            to   { filter: drop-shadow(0 0 28px rgba(204,0,0,0.9)); }
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            color: rgba(255,100,100,0.7);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 20px 40px;
        }
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background: rgba(204,0,0,0.1);
            border: 1px solid rgba(204,0,0,0.25);
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            color: #ff6666;
        }
        .stat-dot {
            width: 7px; height: 7px;
            background: #ff3333;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.75); }
        }

        /* ── Search ── */
        .search-wrap {
            position: relative;
            z-index: 10;
            max-width: 480px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .search-icon {
            position: absolute;
            left: 36px; top: 50%;
            transform: translateY(-50%);
            width: 17px; height: 17px;
            color: rgba(255,80,80,0.5);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 46px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(204,0,0,0.25);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        #searchInput::placeholder { color: rgba(255,100,100,0.35); }
        #searchInput:focus {
            border-color: rgba(204,0,0,0.6);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
        }

        /* ── Filter Tags ── */
        .filter-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 20px 36px;
        }
        .tag {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            border: 1px solid rgba(204,0,0,0.2);
            background: rgba(204,0,0,0.06);
            color: rgba(255,100,100,0.6);
            transition: all 0.25s ease;
            user-select: none;
        }
        .tag:hover, .tag.active {
            background: rgba(204,0,0,0.2);
            border-color: rgba(204,0,0,0.6);
            color: #ff3333;
        }

        /* ── Grid ── */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        #mapGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ── Card ── */
        .map-card {
            background: linear-gradient(135deg, rgba(30,0,0,0.85), rgba(60,0,0,0.6));
            border: 1px solid rgba(204,0,0,0.2);
            border-radius: 16px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: cardIn 0.4s ease both;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }
        .map-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(204,0,0,0.06), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .map-card:hover {
            border-color: rgba(204,0,0,0.55);
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(180,0,0,0.25);
        }
        .map-card:hover::before { opacity: 1; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-icon {
            flex-shrink: 0;
            width: 52px; height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(204,0,0,0.12);
            border: 1px solid rgba(204,0,0,0.2);
            transition: all 0.3s ease;
        }
        .map-card:hover .card-icon {
            background: rgba(204,0,0,0.22);
            border-color: rgba(204,0,0,0.5);
            transform: scale(1.08);
        }

        .card-body { flex: 1; min-width: 0; }
        .card-name {
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-genre {
            font-size: 0.78rem;
            font-family: 'Space Grotesk', sans-serif;
            color: rgba(255,100,100,0.55);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .card-badge {
            flex-shrink: 0;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.3px;
        }
        .badge-working {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.3);
            color: #10b981;
        }
        .badge-new {
            background: rgba(204,0,0,0.15);
            border: 1px solid rgba(204,0,0,0.4);
            color: #ff3333;
        }

        /* ── Empty state ── */
        #emptyState {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,100,100,0.4);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 20px 40px;
            font-size: 0.8rem;
            color: rgba(255,80,80,0.3);
            font-family: 'Space Grotesk', sans-serif;
        }

        @media (max-width: 600px) {
            #mapGrid { grid-template-columns: 1fr; }
            .card-name { font-size: 0.92rem; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg-grid"></div>

    <header>
        <div>
            <a href="https://bpxzshop-bcox.github.io/BPXZ.STORE.X.ALL.02/index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                กลับไป
            </a>
        </div>
        <div class="logo-wrap">
            <img src="https://cdn.discordapp.com/attachments/1475372578871971860/1484863121511420024/BZ2-removebg-preview.png?ex=69bfc60b&is=69be748b&hm=89d9e6555b6b716699d575bc58bcaafe85cfcbedfd332ed4e81e0c5332a14879&" alt="BPXZ STORE Logo">
        </div>
        <h1>รายการแมพ</h1>
        <p class="subtitle">สคริปรองรับทั้งหมด — BPXZ STORE</p>
    </header>

    <div class="stats-bar">
        <div class="stat-pill"><span class="stat-dot"></span>ทำงานได้ปกติ</div>
        <div class="stat-pill">🎮 <span id="totalCount">0</span> แมพ</div>
        <div class="stat-pill">🧩 รองรับทุกตัวรัน</div>
    </div>

    <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="ค้นหาแมพ...">
    </div>

    <div class="filter-wrap" id="filterWrap">
        <span class="tag active" data-genre="all">ทั้งหมด</span>
    </div>

    <div class="container">
        <div id="mapGrid"></div>
        <div id="emptyState">ไม่พบแมพที่ค้นหา 😢</div>
    </div>

    <footer>BPXZ STORE &mdash; อัพเดทล่าสุด 21 มีนาคม 2569</footer>

    <script>
        const MAPS = [
            { name: "MM2",                    icon: "🔪", genre: "Horror",   badge: "working" },
            { name: "Prison Life",            icon: "🏛️", genre: "Prison",   badge: "working" },
            { name: "[FPS] Flick",            icon: "🎯", genre: "FPS",      badge: "working" },
            { name: "Grow a Garden",          icon: "🌱", genre: "Idle",     badge: "working" },
            { name: "99 Nights in the Forest",icon: "🌲", genre: "Survival", badge: "working" },
            { name: "Blox Fruits",            icon: "🍎", genre: "Action",   badge: "working" },
            { name: "Doors",                  icon: "🚪", genre: "Horror",   badge: "working" },
            { name: "Dead Rails",             icon: "🚂", genre: "Survival", badge: "new"     },
            { name: "Evade",                  icon: "🏃", genre: "Horror",   badge: "working" },
            { name: "Escape Tsunami",         icon: "🌊", genre: "Survival", badge: "new"     },
            { name: "RIVALS",                 icon: "⚔️", genre: "Action",   badge: "working" },
        ];

        const genres = ["ทั้งหมด", ...new Set(MAPS.map(m => m.genre))];
        const filterWrap = document.getElementById("filterWrap");
        const grid       = document.getElementById("mapGrid");
        const empty      = document.getElementById("emptyState");
        const searchEl   = document.getElementById("searchInput");

        document.getElementById("totalCount").textContent = MAPS.length;

        genres.forEach((g, i) => {
            if (i === 0) return;
            const span = document.createElement("span");
            span.className = "tag";
            span.dataset.genre = g;
            span.textContent = g;
            filterWrap.appendChild(span);
        });

        let activeGenre = "all";
        let searchQ = "";

        filterWrap.addEventListener("click", e => {
            const t = e.target.closest(".tag");
            if (!t) return;
            document.querySelectorAll(".tag").forEach(x => x.classList.remove("active"));
            t.classList.add("active");
            activeGenre = t.dataset.genre;
            render();
        });

        searchEl.addEventListener("input", e => {
            searchQ = e.target.value.toLowerCase();
            render();
        });

        function render() {
            const filtered = MAPS.filter(m => {
                const matchGenre = activeGenre === "all" || m.genre === activeGenre;
                const matchSearch = m.name.toLowerCase().includes(searchQ) || m.genre.toLowerCase().includes(searchQ);
                return matchGenre && matchSearch;
            });

            grid.innerHTML = "";
            empty.style.display = filtered.length === 0 ? "block" : "none";

            filtered.forEach((m, i) => {
                const card = document.createElement("div");
                card.className = "map-card";
                card.style.animationDelay = (i * 0.05) + "s";
                card.innerHTML = `
                    <div class="card-icon">${m.icon}</div>
                    <div class="card-body">
                        <div class="card-name">${m.name}</div>
                        <div class="card-genre">${m.genre}</div>
                    </div>
                    <span class="card-badge ${m.badge === 'new' ? 'badge-new' : 'badge-working'}">
                        ${m.badge === 'new' ? 'NEW' : '✓ OK'}
                    </span>`;
                grid.appendChild(card);
            });
        }

        render();
    </script>
</body>
</html>
